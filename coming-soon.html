<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutty &amp; Nostalgic — The Drop Is Coming</title>
  <meta name="description" content="The snacks they killed are coming back. Get on the list and be first when the drop goes live.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@400;700&family=VT323&display=swap">

  <link rel="stylesheet" href="assets/css/coming-soon.css">
</head>
<body>

  <!-- SIGNAL-IN intro: static resolves into the page -->
  <div class="signal" id="signal" aria-hidden="true">
    <span class="signal__label">&#9654; TUNING IN&hellip;</span>
  </div>

  <main class="cs">

    <a href="#" class="cs__logo" aria-label="Nutty and Nostalgic">
      <img src="https://i.ibb.co/4nXdcpcZ/nn-logo-footer.png" alt="Nutty &amp; Nostalgic">
    </a>

    <p class="cs__eyebrow"><span class="cs__rec-dot"></span>BROADCAST INCOMING</p>

    <h1 class="cs__headline">PRE-ORDERS ARE<br><span class="cs__hl">DROPPING SOON.</span></h1>

    <!-- Broadcast panel: before/after wipe framed like a CRT -->
    <div class="cs__screen">
      <div class="cs__ba cs__ba--before"><img src="https://i.ibb.co/20GMHYj0/NN-before.png" alt="" aria-hidden="true"></div>
      <div class="cs__ba cs__ba--after"><img src="https://i.ibb.co/rGHshwGF/NN-after.png" alt="" aria-hidden="true"></div>
      <span class="cs__scanlines" aria-hidden="true"></span>
      <span class="cs__vignette" aria-hidden="true"></span>
      <span class="cs__screen-rec" aria-hidden="true"><span class="cs__rec-dot"></span>REC</span>
    </div>

    <!-- Email capture — the hero action -->
    <div class="cs__capture" id="cs-capture">
      <p class="cs__sub">Get on the list for first access the second pre-orders open &mdash; one email, no spam.</p>
      <!-- At Shopify this becomes {% form 'customer' %} → syncs to Omnisend -->
      <form class="cs__form" id="cs-form" action="#" method="post">
        <label class="cs__visually-hidden" for="cs-email">Email address</label>
        <input class="cs__input" type="email" id="cs-email" name="email" placeholder="your@email.com" autocomplete="email" required>
        <button type="submit" class="cs__btn">GET NOTIFIED</button>
      </form>
    </div>

    <!-- Success state -->
    <div class="cs__success" id="cs-success" hidden>
      <p class="cs__success-title">&#9654; YOU'RE ON THE LIST</p>
      <p class="cs__success-sub">Stand by. We'll signal you the second pre-orders open.</p>
    </div>

    <div class="cs__follow">
      <a href="https://instagram.com/nuttynostalgic" target="_blank" rel="noopener">INSTAGRAM</a>
      <span aria-hidden="true">&middot;</span>
      <a href="https://tiktok.com/@nuttynostalgic" target="_blank" rel="noopener">TIKTOK</a>
    </div>

  </main>

  <!-- Chatbot (pager) parked pre-launch — markup/JS/CSS recoverable from git; see project notes -->

  <script>
    (function () {
      // Dismiss the signal-in intro
      var signal = document.getElementById('signal');
      if (signal) {
        setTimeout(function () { signal.classList.add('is-gone'); }, 1900);
      }

      // Email capture (demo) — swap for Shopify form behavior at conversion
      var form = document.getElementById('cs-form');
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          document.getElementById('cs-capture').hidden = true;
          document.getElementById('cs-success').hidden = false;
        });
      }
    })();
  </script>
</body>
</html>
